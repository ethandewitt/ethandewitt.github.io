<!doctype html>
<html>
<head>
  <meta charset = "UTF-8">
  <title>Majors</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.1.2/handlebars.min.js"></script>



  
</head>
<body>
  <h2>Select a Major</h2>

  <button type='button' id='citButton'>CIT Majors</button>
  <button type='button' id='businessButton'>Business Majors</button>

  <div id="result"></div>


  <script id="majorList" type ="text/x-handlebars-template">
  <table>
    <tr>
      <th>Name</th><th>Major</th><th>MidTerm</th><th>Final</th> 
  
    </tr>
    {{#each students}}
    <tr>
      <td>{{name}}</td><td>{{major}}</td><td>{{midterm}}</td><td>{{final}}</td>
    </tr>
    
    {{/each}}

  </table>
  
    
  </script>

  
  
  
  <script>
  
  document.addEventListener("DOMContentLoaded", function() {
    
  document.querySelector("#citButton").onclick = async function() {

    var response = await fetch('cit5students.json');
    
    if (response.ok) {
      var citData = await response.json();

      var citList = citData.filter(function(student) {
        return student.major === "CIT";
      });

      var source = document.querySelector("#majorList").innerHTML;
      var majorList = Handlebars.compile(source)
      document.querySelector("#result").innerHTML = majorList({students: citList } );
    };

   
    
document.querySelector("#businessButton").onclick = async function() {
    var response = await fetch("cit5students.json");

    if (response.ok) {
      var data = await response.json();

      var businessList = data.filter(function(student) {
      return student.major === "BUS"; });

      var source = document.querySelector("#majorList").innerHTML;
      var majorList = Handlebars.compile(source);

      document.querySelector("#result").innerHTML = majorList({students:businessList });
    }};
  });
  </script>
</body>
</html>
    
    

</body></html>
